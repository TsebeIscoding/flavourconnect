# FlavourConnect — Nginx Production Configuration
# Place in /etc/nginx/sites-available/flavourconnect

# ── API Server ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.flavourconnect.com;

    ssl_certificate     /etc/letsencrypt/live/api.flavourconnect.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.flavourconnect.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /var/www/flavourconnect/backend/public;
    index index.php;

    # Uploads — never execute PHP here
    location /uploads/ {
        alias /var/www/flavourconnect/backend/uploads/;
        add_header Content-Disposition "attachment";

        # Deny PHP execution in uploads
        location ~ \.php$ {
            deny all;
        }

        # Only allow image types
        location ~* \.(jpg|jpeg|png|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Block everything else
        location ~ [^/]$ {
            if ($request_filename !~* \.(jpg|jpeg|png|webp)$) {
                return 403;
            }
        }
    }

    # Route all other requests to PHP
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php$ {
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;

        # Pass real IP (for rate limiter)
        fastcgi_param  REMOTE_ADDR $remote_addr;
        fastcgi_param  HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
    }

    # Deny access to .env and hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Logs
    access_log /var/log/nginx/flavourconnect_api_access.log;
    error_log  /var/log/nginx/flavourconnect_api_error.log;
}

# ── Frontend Server ───────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name flavourconnect.com www.flavourconnect.com;

    ssl_certificate     /etc/letsencrypt/live/flavourconnect.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flavourconnect.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https://api.flavourconnect.com data:; connect-src 'self' https://api.flavourconnect.com wss://ws.flavourconnect.com;" always;

    root /var/www/flavourconnect/frontend;
    index index.html;

    # SPA routing — all paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets with caching
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|webp|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# ── WebSocket Proxy ───────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ws.flavourconnect.com;

    ssl_certificate     /etc/letsencrypt/live/ws.flavourconnect.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ws.flavourconnect.com/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name flavourconnect.com www.flavourconnect.com api.flavourconnect.com ws.flavourconnect.com;
    return 301 https://$server_name$request_uri;
}
